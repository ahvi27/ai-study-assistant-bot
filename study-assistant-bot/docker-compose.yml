version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: study_bot_postgres
    environment:
      POSTGRES_DB: study_bot
      POSTGRES_USER: study_bot
      POSTGRES_PASSWORD: study_bot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: study_assistant_bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_URL: postgresql://study_bot:study_bot_password@postgres:5432/study_bot
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      AI_PROVIDER: openai
      RAG_ENABLED: "true"
      ENABLE_RAG: "true"
      STORAGE_TYPE: local
      DEBUG: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
